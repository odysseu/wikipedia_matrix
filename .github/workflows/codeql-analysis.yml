# This file is an automated process made up of one or more jobs.

name: "CodeQL"
# This job will analyse the code syntax
on:
  push:
    branches:
      - main
  pull_request:
    # The branches below must be a subset of the branches above
    branches:
      - main
  schedule:
    - cron: '0 5 1 */3 *'
    # If no changes are made for a while, this cron job will run at 05:00 UTC on the 1st in Feb, May, Aug and Nov.

jobs:
  analyze:
    name: Analyze ${{matrix.language}} code for ${{matrix.os}}
    # Will analyse code for each jobs.analyse.strategy.matrix.os
    runs-on: ${{matrix.os}}
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      # If `fail-fast: true`, GitHub will cancel all in-progress and queued jobs in the matrix if any job in the matrix fails
      matrix:
        language: [ 'java' ]
        os : [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
    # Autobuild attempts to build any compiled languages  (C/C++, C#, or Java).
    - name: Autobuild
      uses: github/codeql-action/init@v4
      with:
        languages: ${{matrix.language}}
        build-mode: autobuild
